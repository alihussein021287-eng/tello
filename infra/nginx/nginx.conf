events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # Main site — fshsmart.com
    server {
        listen 80;
        server_name fshsmart.com www.fshsmart.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name fshsmart.com www.fshsmart.com;

        ssl_certificate /etc/letsencrypt/live/fshsmart.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/fshsmart.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://tello-web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # API — api.fshsmart.com
    server {
        listen 80;
        server_name api.fshsmart.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name api.fshsmart.com;

        ssl_certificate /etc/letsencrypt/live/fshsmart.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/fshsmart.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Rate limit for auth endpoints
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://tello-api:4000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://tello-api:4000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Admin — admin.fshsmart.com
    server {
        listen 80;
        server_name admin.fshsmart.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name admin.fshsmart.com;

        ssl_certificate /etc/letsencrypt/live/fshsmart.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/fshsmart.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Restrict to known IPs (change to your IP)
        # allow YOUR_IP;
        # deny all;

        location / {
            proxy_pass http://tello-admin:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Storage — storage.fshsmart.com (MinIO)
    server {
        listen 443 ssl http2;
        server_name storage.fshsmart.com;

        ssl_certificate /etc/letsencrypt/live/fshsmart.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/fshsmart.com/privkey.pem;

        # Large file uploads
        client_max_body_size 50M;

        location / {
            proxy_pass http://tello-minio:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
